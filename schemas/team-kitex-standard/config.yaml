# OpenSpec 1.4.1 新版配置文件（已完成旧版project.md+旧config完整迁移）
version: "1.0"
context:
  # 项目基础信息
  project: "Kitex Protobuf RPC微服务"
  description: "基于Kitex+Protobuf+GORM+Redis构建的纯同步RPC微服务，完全对齐字节跳动Kitex官方脚手架与团队统一DAL规范，所有Kitex RPC项目强制生效"
  tech_stack: ["Golang 1.21+", "Kitex(Protobuf)", "GORM v2", "Redis 6.0+", "Protobuf"]
  
  # 示例代码文件引用（AI会自动读取这些文件作为编码参考）
  examples:
    - path: "openspec/examples/where/where_constructor_example.go"
      description: "Where查询构造器标准写法，链式调用、类型安全，禁止手写裸SQL"
    - path: "openspec/examples/repo_page_example.go"
      description: "Repo仓储层+统一分页标准实现，包含CRUD、更新方法选型、事务参数传递"
    - path: "openspec/examples/transaction_example.go"
      description: "数据库事务操作标准写法，手动/自动事务两种标准模式"
    - path: "openspec/examples/db_init_example.go"
      description: "多数据库初始化标准模板，全局唯一DB入口，支持多库隔离"
    - path: "openspec/examples/scaffold_command.txt"
      description: "Kitex脚手架标准生成命令模板，所有RPC代码生成必须以此为准"
    - path: "openspec/examples/joins/where/where_constructor_example.go"
      description: "Joins连表场景的Where查询构造器标准写法，指针内嵌BaseWhere，链式入参"
    - path: "openspec/examples/joins/repo_page_example.go"
      description: "Joins连表场景的Repo+分页标准实现，Preload连表查询、DTO结果映射"
    - path: "openspec/examples/where/demo_info_price_where.go"
      description: "DemoInfoPrice价格表的Where查询构造器标准写法"
    - path: "openspec/examples/demo_info_price.go"
      description: "DemoInfoPrice关联表模型定义及仓储层标准实现，包含Repo+GetWhere"
  
  # 全局强制规约（已整合旧project.md+旧config的所有规则）
  conventions:
    # 语言规范
    language:
      all_docs_use_zh: true
      allowed_english_terms: ["ctx", "db", "req", "resp", "gorm", "redis", "kitex"]
    
    # 编码规范
    code:
      struct_init_mode: "aggregate"
      variable_auto_infer: true
      forbid_shadow_variable: true
      infinite_loop_style: "for{}"
      json_use_raw_string: true
      forbid_global_biz_var: true
      single_line_comment_only: true
      lint_nolint_support: true
    
    # 目录结构规范
    # 目录结构规范
    directory:
      root_dirs: ["idl", "kitex_gen", "layout", "conf", "biz"]
      biz_sub_dirs: ["service", "logic", "convert", "dal/gormL", "dal/redis"]
      dir_rules:
        conf:
          only_allow_yaml: true
          forbid_go_source: true
        kitex_gen:
          forbid_manual_edit: true
        idl:
          only_allow_protobuf: true
        # 多库目录自动创建
        biz/dal/gormL:
          auto_create_sub_db_dir: true
        # 所有业务库下 where 目录约束
        biz/dal/gormL/*/where:
          only_allow_go: true
          forbid_other_file: true
    # 分层职责约束
    layer:
      service:
        can_hold_light_biz: true
        can_hold_cache_op: true
        forbid_heavy_biz: true
        forbid_raw_sql: true
      logic:
        forbid_depend_upper_layer: true
      convert:
        forbid_biz_logic: true
      dal:
        forbid_hard_code: true
    
    # 分层依赖白名单
    deps_whitelist:
      biz/service: ["biz/logic", "biz/convert", "biz/dal"]
      biz/logic: ["biz/convert", "biz/dal"]
    
    # DAL层全局规范
    dal:
      db_isolate_mode: "multi_db_isolate"
      init_file_path: "biz/dal/gormL/init.go"
      where_constructor:
        enable: true
        base_struct: "gormL.BaseWhere"
        forbid_raw_sql: true
      repo:
        forbid_global_singleton: true
        must_implement_get_where: true
        where_only_from_repo_method: true
      page:
        limit_plus_one_mode: true
        auto_calc_has_more: true
        standard_page_struct: "widget.Page"
    join_spec:
      enable: true
      # 修正目录层级：库级和where平级，而非单表内平级
      join_dir_relation: "db_level_sibling_with_where"
      # joins内部子目录约束
      joins_sub_dir: ["where"]
      # 红线禁止项【全部同步最终Joins落地方案，清理过时Preload规则】
      forbidden_rules:
        - 禁止自定义任何表别名，全链路使用数据库原生表名
        - 禁止where、order、join条件省略表名，所有多表关联查询必须携带原生表名
        - 禁止单表repo内追加Joins语句，所有JOIN查询全部收敛至库级joins目录
        - 禁止SELECT * 查询，连表查询必须显式携带【`表名`.`字段`】，重名字段强制SQL别名
        - 禁止在joins承接DTO内定义TableName、gorm.Model、gorm关联标签
        - 禁止使用Preload做跨表关联查询，Preload仅允许用于一对一嵌套展示场景
        - Where层禁止结构体属性入参，统一使用链式方法返回自身
        - 禁止exists模拟内连接，内外连接统一通过db.Joins原生语法切换
      # 全局连表字段默认配置
      column_spec:
        # 强制字段语法模板
        syntax: "`table_name`.`column_name`"
        # 重名字段别名强制规则
        duplicate_alias_rule: "关联表同名字段统一别名: 关联表短前缀_字段名，例demo_info_price.id => price_id"
      # 重构preload_spec：仅保留边缘场景约束，不作为主流连表方案
      preload_spec:
        table_source: "仅读取dal原生db模型TableName，不读取joins承接DTO"
        usage_limit: "仅用于前端需要嵌套结构体返回的一对一场景，禁止一对多使用"
      # 新增joins专属核心规约，补齐之前缺失的DTO规范
      joins_spec:
        sql_type: "统一单SQL db.Joins，不使用双SQL预加载"
        join_type: "LEFT JOIN/INNER JOIN直接通过Joins入参切换，无需额外兜底逻辑"
        dto_style: "优先使用嵌套子DTO（主表/关联表字段语义隔离），简单查询可使用字段平铺，禁止混用两种风格"
        one_to_many_rule: "一对多Joins查询必须添加Distinct(`主表.*`)去重，避免主表数据重复"
    repo_extend:
      # 彻底删除别名相关配置，清理残留注释
      alias_standard: null
      mandatory_method:
        require_alias_field_method: false
        require_alias_gorm_model: false
        require_table_alias_method: false
      tx_spec:
        dal_reject_tx_param: true
        desc: "DAL层所有方法禁止接收tx入参，事务统一上层logic和Service管控"
    # 新增where全局规约，对齐链式where代码
    where_spec:
      embed_rule: "统一指针内嵌*gormL.BaseWhere，禁止值内嵌"
      instance_rule: "禁止全局缓存where实例，每次查询通过GetWhere新建实例"
      coding_rule: "禁止结构体存储查询参数，统一链式方法返回自身"
      table_rule: "单表where可省略表名；joins/where无论是否join，全部强制携带原生表名"
    # 全局禁止行为红线
    forbidden_rules:
      - "禁止logic层反向依赖service上层模块"
      - "禁止convert层编写任何业务逻辑、判断逻辑"
      - "禁止Repo全局单例，必须每次新建实例"
      - "禁止手动new实例化Where结构体，必须通过Repo.GetWhere()获取"
      - "禁止手写裸SQL，所有查询必须使用where链式构造器"
      - "禁止跨层、反向非法依赖，严格遵守分层白名单"
      - "禁止手动修改kitex_gen自动生成目录的代码"
      - "禁止conf目录存放任何Go源码文件"
      - "禁止硬编码业务常量、状态、时间等数据"

# 绑定当前使用的AI工具
tools:
  - name: "Qoder"

# 强制禁用交互模式（彻底解决Windows终端兼容性卡死问题）
no_interactive: true