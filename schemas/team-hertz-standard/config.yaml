# OpenSpec 1.4.1 新版配置文件（Hertz Web服务专属）
version: "1.0"
no_interactive: true

context:
  # 项目基础信息
  project: "hertz-web-manage"
  display_name: "Hertz Web后台管理服务"
  service_type: ["web"]
  description: "基于Hertz+Protobuf开发的Web接口与Liquid页面渲染服务，对齐团队统一DAL分层规范"
  tech_stack: ["Golang 1.21+", "Hertz", "Protobuf", "GORM v2", "Redis 6.0+", "Liquid"]
  
  # 关联代码示例文件（AI自动读取参考）
  examples:
    - path: "openspec/examples/where/where_constructor_example.go"
      description: "Where链式查询构造器标准写法，类型安全禁止裸SQL"
    - path: "openspec/examples/repo_page_example.go"
      description: "Repo仓储层+统一分页完整实现，包含CRUD、更新方法选型"
    - path: "openspec/examples/transaction_example.go"
      description: "GORM两种事务标准写法，手动/自动事务两种模式"
    - path: "openspec/examples/db_init_example.go"
      description: "多数据库统一初始化init.go模板，全局唯一DB入口"
    - path: "openspec/examples/hz_scaffold_command.txt"
      description: "Hertz Protobuf脚手架标准生成命令模板"
    - path: "openspec/examples/joins/where/where_constructor_example.go"
      description: "Joins连表场景的Where查询构造器标准写法，指针内嵌BaseWhere，链式入参"
    - path: "openspec/examples/joins/repo_page_example.go"
      description: "Joins连表场景的Repo+分页标准实现，Preload连表查询、DTO结果映射"
    - path: "openspec/examples/where/demo_info_price_where.go"
      description: "DemoInfoPrice价格表的Where查询构造器标准写法"
    - path: "openspec/examples/demo_info_price.go"
      description: "DemoInfoPrice关联表模型定义及仓储层标准实现，包含Repo+GetWhere"
  # 全局编码规范
  code_rule:
    comment_rule: "single_line"
    string_backtick: true
    infinite_for: true
    struct_aggregate_init: true
    auto_type_infer: true
    forbid_var_shadow: true
    forbid_global_biz_var: true
    lint_nolint_allow: true
  
  # 工程目录结构约束
  dir_struct:
    root_keep:
      - idl
      - layout
      - conf
      - golang
      - render
    biz_path: "golang/biz"
    biz_sub_dir:
      - handle
      - model
      - router
      - mw
      - logic
      - convert
      - dal
  # 目录专属强约束
  dir_rule:
    conf:
      only_yaml: true
      forbid_go_file: true
    idl:
      only_protobuf: true
    golang/biz/router:
      manual_edit_forbid: true
    golang/biz/model:
      manual_edit_forbid: true
    # gormL 自动创建多库子目录
    golang/biz/dal/gormL:
      auto_create_sub_db_dir: true
    # 所有库下的 where 目录约束：仅允许Go文件、禁止其他文件
    golang/biz/dal/gormL/*/where:
      only_go_file: true
      forbid_other_file: true
    render:
      only_html_asset: true
      forbid_go_file: true
      layer_limit: 2
      forbid_flat_root_html: true
      forbid_multi_layer_nest: true
  
  # 分层职责 & 依赖白名单
  layer_rule:
    deps_whitelist:
      golang/biz/handle: ["golang/biz/logic", "golang/biz/convert", "golang/biz/dal"]
      golang/biz/logic: ["golang/biz/convert", "golang/biz/dal"]
      golang/biz/convert: []
      golang/biz/dal: []
    layer_constraint:
      handle_allow_light_biz: true
      handle_allow_cache_opt: true
      handle_forbid_heavy_biz: true
      handle_forbid_raw_sql: true
      logic_forbid_depend_upper: true
      convert_forbid_biz_logic: true
  
  # DAL层强制规范
  dal:
    db_init_file: "golang/biz/dal/gormL/init.go"
    multi_db_isolate: true
    where:
      enable: true
      forbid_raw_sql: true
      only_from_repo_get: true
    repo:
      forbid_global_singleton: true
      must_new_instance: true
      must_implement_get_where: true
    page:
      limit_plus_one: true
      auto_calc_has_more: true
      auto_clip_list: true
      page_struct: "widget.Page"
    join_spec:
      enable: true
      # 修正目录层级：库级和where平级，而非单表内平级
      join_dir_relation: "db_level_sibling_with_where"
      # joins内部子目录约束
      joins_sub_dir: ["where"]
      # 红线禁止项【全部同步最终Joins落地方案，清理过时Preload规则】
      forbidden_rules:
        - 禁止自定义任何表别名，全链路使用数据库原生表名
        - 禁止where、order、join条件省略表名，所有多表关联查询必须携带原生表名
        - 禁止单表repo内追加Joins语句，所有JOIN查询全部收敛至库级joins目录
        - 禁止SELECT * 查询，连表查询必须显式携带【`表名`.`字段`】，重名字段强制SQL别名
        - 禁止在joins承接DTO内定义TableName、gorm.Model、gorm关联标签
        - 禁止使用Preload做跨表关联查询，Preload仅允许用于一对一嵌套展示场景
        - Where层禁止结构体属性入参，统一使用链式方法返回自身
        - 禁止exists模拟内连接，内外连接统一通过db.Joins原生语法切换
      # 全局连表字段默认配置
      column_spec:
        # 强制字段语法模板
        syntax: "`table_name`.`column_name`"
        # 重名字段别名强制规则
        duplicate_alias_rule: "关联表同名字段统一别名: 关联表短前缀_字段名，例demo_info_price.id => price_id"
      # 重构preload_spec：仅保留边缘场景约束，不作为主流连表方案
      preload_spec:
        table_source: "仅读取dal原生db模型TableName，不读取joins承接DTO"
        usage_limit: "仅用于前端需要嵌套结构体返回的一对一场景，禁止一对多使用"
      # 新增joins专属核心规约，补齐之前缺失的DTO规范
      joins_spec:
        sql_type: "统一单SQL db.Joins，不使用双SQL预加载"
        join_type: "LEFT JOIN/INNER JOIN直接通过Joins入参切换，无需额外兜底逻辑"
        dto_style: "优先使用嵌套子DTO（主表/关联表字段语义隔离），简单查询可使用字段平铺，禁止混用两种风格"
        one_to_many_rule: "一对多Joins查询必须添加Distinct(`主表.*`)去重，避免主表数据重复"
    repo_extend:
      # 彻底删除别名相关配置，清理残留注释
      alias_standard: null
      mandatory_method:
        require_alias_field_method: false
        require_alias_gorm_model: false
        require_table_alias_method: false
      tx_spec:
        dal_reject_tx_param: true
        desc: "DAL层所有方法禁止接收tx入参，事务统一上层logic和Service管控"
    # 新增where全局规约，对齐链式where代码
    where_spec:
      embed_rule: "统一指针内嵌*gormL.BaseWhere，禁止值内嵌"
      instance_rule: "禁止全局缓存where实例，每次查询通过GetWhere新建实例"
      coding_rule: "禁止结构体存储查询参数，统一链式方法返回自身"
      table_rule: "单表where可省略表名；joins/where无论是否join，全部强制携带原生表名"
  
  # 脚手架生成规范
  hz_scaffold:
    proto_mode: true
    forbid_manual_write_router: true
    forbid_manual_write_model: true
    update_by_proto_only: true
  
  # 全局红线禁止规则
  forbidden_rule:
    - "禁止logic层反向依赖handle上层模块，禁止循环依赖"
    - "禁止convert层编写任何业务判断、数据处理、流程逻辑"
    - "禁止handle层编写可复用重型通用业务逻辑，必须下沉logic"
    - "禁止手动new实例化Where结构体，必须通过Repo.GetWhere()获取"
    - "禁止手写裸SQL，全部使用where链式构造器查询"
    - "禁止Repo全局单例，每次使用必须新建实例"
    - "禁止conf目录存放Go源码文件，仅允许yaml配置"
    - "禁止手动修改router、model脚手架自动生成代码"
    - "禁止业务硬编码常量、状态、时间、ID等固定数据"
    - "禁止render目录层级混乱，必须严格两层结构：一级业务模块/二级子页面"

# 绑定当前使用的AI工具
tools:
  - name: "Qoder"
